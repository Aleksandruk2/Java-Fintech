<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Реєстрація</title>
</head>
<body>
<div layout:fragment="content" class="relative flex flex-col items-center justify-center w-full mt-10">
    <div class="bg-white/70 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-green-700 mb-6">Реєстрація в систему</h1>

        <form class="space-y-5" th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">

            <div>
                <label for="username" class="block text-green-800 font-medium mb-1">Ім’я користувача</label>
                <input id="username" name="username" th:field="*{username}" type="text" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="email" class="block text-green-800 font-medium mb-1">Електрона пошта</label>
                <input id="email" name="email" th:field="*{email}" type="text" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="image" class="block text-green-800 font-medium mb-1">Зображення</label>
                <input id="image" name="image" type="file" accept="image/*"
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="password" class="block text-green-800 font-medium mb-1">Пароль</label>
                <input id="password" name="password" th:field="*{password}" type="password" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <div>
                <label for="confirmPassword" class="block text-green-800 font-medium mb-1">Підтвердження Пароля</label>
                <input id="confirmPassword" name="confirmPassword" th:field="*{confirmPassword}" type="password" required
                       class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700">
                зареєструватися
            </button>

            <div class="text-center mt-3">
                <a th:href="@{/forgot-password}" class="text-green-700 hover:underline font-medium">
                    Забули пароль?
                </a>
            </div>
        </form>

        <div class="text-center mt-4 text-green-700 font-medium">
            <p th:if="${param.error}" class="text-red-600">Неправильне ім’я або пароль.</p>

            <p th:if="${param.logout}" class="text-green-600">Ви вийшли із системи.</p>

            <p class="mt-4">
                Маєте профіль?
                <a th:href="@{/login}" class="text-green-700 font-semibold hover:underline">Увійти</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
