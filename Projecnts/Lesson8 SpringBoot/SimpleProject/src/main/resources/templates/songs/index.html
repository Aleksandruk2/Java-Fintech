<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Пісні</title>
</head>
<body>
<div layout:fragment="content">
    <h1 class="text-3xl font-bold mb-4 text-gray-900 text-center">
        Список пісень
    </h1>
    <div th:if="${#lists.isEmpty(songs)}">
        <p class="text-gray-500">Пісні відсутні</p>
    </div>
    <div th:if="${!#lists.isEmpty(songs)}" class="space-y-4">
        <div th:each="song : ${songs}" class="border border-gray-300 rounded-lg p-4 bg-white shadow-sm hover:shadow-md transition duration-200">

            <div class="bg-gray-100 rounded-3xl p-4 ps-5">
                <h2 class="text-xl font-bold text-gray-900 mb-2" th:text="${song.name}"></h2>
                <p class="text-gray-700">
                    <span class="font-semibold">Виконавець:</span>
                    <span th:text="${song.artist}"></span>
                </p>
                <p class="text-gray-700">
                    <span class="font-semibold">Альбом:</span>
                    <span th:text="${song.album}"></span>
                </p>
                <div class="text-gray-700 line-clamp-1">
                    <span class="font-semibold">Жанри:</span>
                    <span th:each="g, stat : ${song.genres}">
                    <span th:text="${g.name}"></span>
                    <span th:if="${!stat.last}">, </span>
                </span>
                </div>
            </div>

            <div class="py-2">
                <audio id="player-container" controls class="w-full rounded-full hover:shadow-md transition duration-200"
                       th:src="@{'/music/' + ${song.fileName}}"
                >
                </audio>
            </div>
        </div>
    </div>
</div>
</body>
</html>
