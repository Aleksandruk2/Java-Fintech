<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <h2 class="text-2xl font-bold mb-6">Додати жанр</h2>

    <form action="/genres/create" method="post" class="bg-white p-6 rounded-xl shadow-md max-w-md">

        <div class="mb-4">
            <label class="block mb-2 font-medium">Назва</label>
            <input type="text" name="name" th:value="${genre.name}"
                   class="w-full border p-2 rounded"
                   required>
        </div>

        <div class="mb-4">
            <label class="block mb-2 font-medium">Опис</label>
            <textarea name="description" th:text="${genre.description}"
                      class="w-full border p-2 rounded"></textarea>
        </div>

        <p th:if="${error}" th:text="${error}" class="text-red-500"></p>

        <button type="submit"
                class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
            Зберегти
        </button>

    </form>

</div>
</html>
